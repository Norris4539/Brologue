<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ede0c8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Brologue — Train. Track. Triumph.</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --paper:#ede0c8; --paper2:#f4ead6; --ink:#2b2016; --red:#b3311c; --red2:#8f2210;
    --tan:#8a6f4d; --faded:#6e5b41; --pale:#c4b294; --line:#d8c9a8;
    --wood:Haettenschweiler,Impact,'Arial Narrow Bold','Arial Narrow',sans-serif;
    --serif:Georgia,'Times New Roman',serif;
    --small:Verdana,Geneva,sans-serif;
    --sab:env(safe-area-inset-bottom,0px);
  }
  html,body{height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--serif);overscroll-behavior-y:none;color-scheme:light}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(43,32,22,.055) 1px,transparent 1px);background-size:4px 4px}
  button{font-family:inherit;border:0;background:none;color:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  #app{height:100dvh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative;z-index:1}
  .screen{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .scrolly{flex:1;overflow-y:auto;padding:14px 16px calc(20px + var(--sab));min-height:0}

  /* app bar + masthead */
  .app-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px;
    border-bottom:3px double var(--ink);margin:0 16px;padding-left:0;padding-right:0}
  .app-bar .title{font-family:var(--wood);font-size:26px;letter-spacing:1.5px;text-transform:uppercase;line-height:1}
  .brand{font-family:var(--wood);font-size:26px;letter-spacing:2px;text-transform:uppercase;color:var(--ink);line-height:1}
  .brand em{font-style:normal;color:var(--red)}
  .icon-btn{font-size:19px;padding:6px 8px;color:var(--faded)}
  .icon-btn:active{background:rgba(43,32,22,.08)}
  .mast{display:flex;justify-content:space-between;align-items:center;gap:8px;color:var(--faded);
    font-family:var(--small);font-size:8.5px;letter-spacing:2px;font-weight:700;text-transform:uppercase;padding:10px 0 4px}

  /* kick / heading */
  .kick{color:var(--red);font-size:10px;letter-spacing:3px;font-weight:800;text-transform:uppercase;font-family:var(--small)}
  .h1{font-family:var(--wood);font-size:38px;letter-spacing:1px;text-transform:uppercase;line-height:.92;margin-top:4px}
  .meta{color:var(--faded);font-size:12.5px;margin-top:4px;font-style:italic}
  .sl{color:var(--faded);font-size:10px;letter-spacing:3px;font-weight:800;text-transform:uppercase;margin:20px 2px 8px;
    font-family:var(--small);display:flex;align-items:center;gap:8px}
  .sl::after{content:'';flex:1;border-top:1px solid var(--ink)}

  /* motivation row */
  .mot{display:flex;align-items:center;gap:9px;margin-top:10px;flex-wrap:wrap}
  .streak{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;background:var(--ink);color:var(--paper);
    font-size:10.5px;font-weight:800;letter-spacing:2px;text-transform:uppercase;font-family:var(--small)}
  .streak.cold{background:transparent;color:var(--faded);border:1.5px solid var(--ink)}
  .quote{color:var(--tan);font-size:12.5px;font-style:italic}

  /* cards — double-rule newsprint boxes */
  .card{background:var(--paper2);border:1.5px solid var(--ink);outline:1px solid var(--ink);outline-offset:3px;
    padding:9px 14px;margin:14px 4px 6px}
  .exrow{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;padding:8px 0;border-bottom:1px dotted var(--tan)}
  .exrow:last-child{border-bottom:0}
  .exrow .set{font-family:var(--wood);font-size:17px;letter-spacing:1px;color:var(--red);white-space:nowrap;margin-left:10px}
  .cta{display:block;width:100%;background:var(--red);color:var(--paper);text-align:center;font-family:var(--wood);
    font-size:19px;letter-spacing:3px;padding:13px;margin-top:16px;text-transform:uppercase;
    border:1.5px solid var(--ink);box-shadow:3px 3px 0 var(--ink)}
  .cta:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .cta.ghost{background:var(--paper2);color:var(--ink)}
  .empty{color:var(--faded);font-size:13.5px;text-align:center;padding:22px 10px;line-height:1.65;font-style:italic}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-size:11px;font-weight:700;
    background:var(--paper2);border:1.5px solid var(--ink);color:var(--ink);font-family:var(--small);letter-spacing:.5px;text-transform:uppercase}
  .chip.on{background:var(--ink);color:var(--paper)}
  .chiprow{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}

  /* calendar: segmented + bar (Dokit layout) */
  .cal-seg{display:flex;border:1.5px solid var(--ink);margin:12px 16px 0;background:var(--paper2)}
  .cal-seg button{flex:1;padding:8px 0;font-family:var(--wood);font-size:14px;letter-spacing:2px;color:var(--faded);
    text-transform:uppercase;border-right:1.5px solid var(--ink)}
  .cal-seg button:last-child{border-right:0}
  .cal-seg button.on{background:var(--ink);color:var(--paper)}
  /* mini month (Today screen) */
  .mini-cal{background:var(--paper2);border:1.5px solid var(--ink);outline:1px solid var(--ink);outline-offset:3px;
    padding:12px 10px 10px;margin:10px 4px 4px}
  .mini-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 8px}
  .mini-head b{font-family:var(--wood);font-size:15px;letter-spacing:2px;text-transform:uppercase;font-weight:400}
  .mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
  .mini-dow{color:var(--tan);font-size:9px;font-weight:800;padding-bottom:5px;font-family:var(--small)}
  .mini-d{color:var(--ink);font-size:11.5px;padding:6px 0;position:relative;cursor:pointer;font-weight:600}
  .mini-d.dim{color:var(--pale)}
  .mini-d.ev::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--red)}
  .mini-d.done::after{background:var(--tan)}
  .mini-d.today{background:var(--ink);color:var(--paper);font-weight:900}
  .mini-d.today::after{background:var(--paper)}

  /* day sheet */
  .day-ev{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 2px;border-bottom:1px dotted var(--tan);cursor:pointer}
  .day-ev:last-child{border-bottom:0}
  .day-ev .dn{font-family:var(--wood);font-size:17px;letter-spacing:.5px;text-transform:uppercase}
  .day-ev .dm{font-size:11px;color:var(--faded);font-style:italic;margin-top:1px}
  .day-ev .dt{font-family:var(--small);font-size:10px;font-weight:800;color:var(--red);letter-spacing:1px;white-space:nowrap}
  .day-ev.done .dn{color:var(--faded);text-decoration:line-through}

  /* custom workout builder */

  .bx-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .bx-name{font-family:var(--wood);font-size:17px;letter-spacing:.5px;text-transform:uppercase}
  .bx-mus{font-size:8.5px;font-weight:800;letter-spacing:1.5px;color:var(--red);font-family:var(--small);text-transform:uppercase;margin-top:2px}
  .bx-x{color:var(--red);font-size:15px;padding:2px 6px}
  .bx-ctl{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
  .bx-f{display:flex;align-items:center;gap:6px}
  .bx-f label{font-size:8.5px;font-weight:800;letter-spacing:1px;color:var(--faded);font-family:var(--small);text-transform:uppercase}
  .bx-f input{width:56px;background:var(--paper);border:1.5px solid var(--ink);color:var(--ink);font-size:13px;padding:6px 4px;text-align:center;outline:none;border-radius:0}

  /* exercise picker */
  .pick-list{max-height:44dvh;overflow-y:auto;border:1.5px solid var(--ink);background:var(--paper2);margin-top:10px}
  .pick-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px dotted var(--tan);cursor:pointer}
  .pick-item:last-child{border-bottom:0}
  .pick-item:active{background:#e5d7b8}
  .pick-item .pn{font-size:13.5px;font-weight:700}
  .pick-item .pe{font-size:10px;color:var(--faded);font-style:italic;margin-top:1px}
  .pick-item .pm{font-size:8.5px;font-weight:800;letter-spacing:1.5px;color:var(--red);font-family:var(--small);text-transform:uppercase}

  /* tab bar */
  .tabs{flex:none;display:flex;justify-content:space-around;align-items:center;background:var(--ink);
    padding:8px 4px calc(10px + var(--sab))}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--tan);font-size:9.5px;font-weight:700;
    letter-spacing:1.5px;padding:4px 12px;text-transform:uppercase;font-family:var(--small)}
  .tab .ic{font-size:19px;line-height:1;filter:grayscale(1) opacity(.5)}
  .tab.on{color:var(--paper)}
  .tab.on .ic{filter:grayscale(1) brightness(3)}

  /* inputs */
  .field{margin-top:12px}
  .field label{display:block;font-size:10px;font-weight:800;letter-spacing:2px;color:var(--faded);text-transform:uppercase;
    margin-bottom:6px;font-family:var(--small)}
  .inp{width:100%;background:var(--paper2);border:1.5px solid var(--ink);color:var(--ink);
    font-size:14px;padding:11px 12px;outline:none;border-radius:0}
  .inp:focus{border-color:var(--red);box-shadow:2px 2px 0 var(--ink)}
  input[type=date].inp,input[type=time].inp{color-scheme:light}

  /* themed dropdown (replaces native <select>) */
  .ssel{position:relative}
  .ssel-btn{display:flex;justify-content:space-between;align-items:center;width:100%;background:var(--paper2);
    border:1.5px solid var(--ink);color:var(--ink);font-size:14px;padding:11px 12px;text-align:left;gap:8px}
  .ssel-btn:active{box-shadow:2px 2px 0 var(--ink)}
  .ssel-arr{color:var(--red);font-size:12px;flex:none}
  .ssel-list{display:none;position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--paper2);
    border:1.5px solid var(--ink);box-shadow:3px 3px 0 rgba(43,32,22,.4);max-height:38dvh;overflow-y:auto;z-index:60}
  .ssel-item{padding:11px 12px;font-size:13.5px;border-bottom:1px dotted var(--tan);cursor:pointer}
  .ssel-item:last-child{border-bottom:0}
  .ssel-item.on{background:var(--ink);color:var(--paper);font-weight:700}
  .ssel-item:active{background:#e5d7b8}

  /* sheet / modal */
  .sheet-back{position:fixed;inset:0;background:rgba(43,32,22,.55);z-index:40;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--paper);border:2px solid var(--ink);border-bottom:0;width:100%;max-width:560px;
    max-height:88dvh;overflow-y:auto;padding:18px 18px calc(22px + var(--sab));animation:slideup .22s ease;
    background-image:radial-gradient(rgba(43,32,22,.05) 1px,transparent 1px);background-size:4px 4px}
  .sheet h3{font-family:var(--wood);font-size:24px;letter-spacing:1.5px;text-transform:uppercase;font-weight:400}
  .sheet .close{position:sticky;float:right;top:0;color:var(--faded);font-size:20px;padding:2px 8px}
  .btnrow{display:flex;gap:10px;margin-top:16px}
  .btnrow .cta{margin-top:0}
  .danger{color:var(--red)}
  .cta.ghost.danger{color:var(--red)}
  @keyframes slideup{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .anim-fade{animation:fadein .18s ease}

  /* session logger */
  .setrow{display:flex;align-items:center;gap:8px;padding:6px 0}
  .setrow .snum{width:22px;font-size:10px;font-weight:800;color:var(--tan);font-family:var(--small)}
  .setrow input{width:64px;background:var(--paper);border:1.5px solid var(--ink);color:var(--ink);
    font-size:13px;padding:7px 8px;text-align:center;outline:none;border-radius:0}
  .setrow .unit{font-size:10px;color:var(--tan);margin-left:-4px;font-style:italic}
  .tick{width:30px;height:30px;border:1.5px solid var(--ink);display:flex;align-items:center;
    justify-content:center;font-size:15px;color:transparent;margin-left:auto;flex:none;background:var(--paper2)}
  .tick.on{background:var(--red);border-color:var(--ink);color:var(--paper)}
  .exhead{display:flex;justify-content:space-between;align-items:baseline;margin-top:4px}
  .exhead b{font-family:var(--wood);font-size:18px;letter-spacing:1px;text-transform:uppercase;font-weight:400}
  .exhead span{font-size:11px;color:var(--faded);font-style:italic}
  .doneburst{text-align:center;padding:36px 14px}
  .doneburst .big{font-size:52px}
  .doneburst h2{font-family:var(--wood);font-size:40px;letter-spacing:1px;text-transform:uppercase;margin-top:8px;
    color:var(--red);font-weight:400;line-height:.95}
  .doneburst p{color:var(--faded);font-size:13.5px;margin-top:10px;line-height:1.6;font-style:italic}

  /* library */
  .plan-card{background:var(--paper2);border:1.5px solid var(--ink);padding:14px;margin:12px 4px 0;cursor:pointer;
    box-shadow:3px 3px 0 rgba(43,32,22,.25)}
  .plan-card h4{font-family:var(--wood);font-size:21px;letter-spacing:1px;text-transform:uppercase;font-weight:400}
  .plan-card .pd{color:var(--faded);font-size:12px;margin-top:4px;line-height:1.55;font-style:italic}
  .plan-card .tags{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .tag{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);
    border:1px solid var(--red);padding:2px 8px;font-family:var(--small)}
  .ex-item{display:flex;justify-content:space-between;align-items:center;padding:10px 2px;border-bottom:1px dotted var(--tan)}
  .ex-item:last-child{border-bottom:0}
  .ex-item .en{font-size:13.5px;font-weight:700}
  .ex-item .eq{font-size:10.5px;color:var(--faded);margin-top:2px;font-style:italic}
  .ex-item .mus{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);font-family:var(--small)}
  .ex-item.blocked{opacity:.5}
  .ex-item .sub{font-size:10.5px;color:var(--red)}

  /* coach */
  .chat{flex:1;overflow-y:auto;min-height:0;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:86%;padding:10px 13px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .msg.user{align-self:flex-end;background:var(--ink);color:var(--paper)}
  .msg.bot{align-self:flex-start;background:var(--paper2);border:1.5px solid var(--ink)}
  .msg.bot.demo{border-style:dashed}
  .msg .demo-tag{display:block;font-size:8.5px;font-weight:800;letter-spacing:2px;color:var(--tan);margin-bottom:4px;font-family:var(--small)}
  .coach-input{flex:none;display:flex;gap:8px;padding:10px 14px calc(12px + var(--sab));background:var(--paper);border-top:2px solid var(--ink)}
  .coach-input textarea{flex:1;background:var(--paper2);border:1.5px solid var(--ink);color:var(--ink);
    font-size:14px;padding:10px 12px;resize:none;outline:none;max-height:110px;border-radius:0}
  .send{width:44px;height:44px;background:var(--red);color:var(--paper);font-size:17px;font-weight:900;flex:none;border:1.5px solid var(--ink)}
  .send:disabled{opacity:.4}
  .typing{color:var(--faded);font-size:12px;padding:0 4px;font-style:italic}
  .keynote{background:var(--paper2);border:1.5px dashed var(--ink);padding:10px 13px;margin:10px 16px 0;
    font-size:12px;color:var(--ink);line-height:1.6;font-style:italic}
  .keynote a{color:var(--red)}

  /* install banner + splash */
  .install-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + var(--sab));width:min(92%,520px);
    background:var(--paper);border:2px solid var(--ink);padding:12px 14px;z-index:60;
    display:flex;align-items:center;gap:10px;box-shadow:4px 4px 0 rgba(43,32,22,.4)}
  .install-bar .t{flex:1;font-size:12.5px;line-height:1.5;color:var(--ink);font-style:italic}
  .install-bar .go{background:var(--red);color:var(--paper);font-family:var(--wood);font-size:14px;letter-spacing:2px;
    padding:9px 14px;border:1.5px solid var(--ink);text-transform:uppercase}
  #splash{position:fixed;inset:0;background:var(--paper);z-index:100;display:none;
    align-items:center;justify-content:center;flex-direction:column;gap:12px;
    background-image:radial-gradient(rgba(43,32,22,.05) 1px,transparent 1px);background-size:4px 4px}
  #splash .flame{font-size:52px;animation:pulse 1.1s ease infinite}
  #splash .bn{font-family:var(--wood);font-size:34px;letter-spacing:4px;text-transform:uppercase;color:var(--ink);
    border-top:3px double var(--ink);border-bottom:3px double var(--ink);padding:6px 18px}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + var(--sab));background:var(--ink);color:var(--paper);
    padding:10px 18px;font-size:11.5px;font-weight:700;z-index:80;letter-spacing:1px;text-transform:uppercase;
    font-family:var(--small);box-shadow:3px 3px 0 rgba(43,32,22,.35);animation:fadein .2s ease}
</style>
</head>

<div id="splash"><div class="flame">🔥</div><div class="bn">Brologue</div></div>
<div id="app"></div>
<script>
'use strict';
/* ── Brologue — workout & fitness tracking PWA ─────────────────────── */

/* DOM helper (Dokit pattern) */
function h(tag, attrs, ...children){
  const el = document.createElement(tag);
  if(attrs) for(const [k,v] of Object.entries(attrs)){
    if(k === 'className') el.className = v;
    else if(k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if(k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
    else if(v !== null && v !== undefined) el.setAttribute(k, v);
  }
  for(const c of children.flat()) if(c !== null && c !== undefined && c !== false) el.append(c.nodeType ? c : document.createTextNode(c));
  return el;
}

/* themed dropdown — native <select> opens the OS picker on phones */
function styledSelect(options, value, onChange){
  let cur = value !== undefined ? value : (options[0] && options[0][0]);
  const label = v => { const o = options.find(x=>x[0]===v); return o ? o[1] : ''; };
  const btnTxt = h('span',{}, label(cur));
  const list = h('div',{className:'ssel-list'});
  const root = h('div',{className:'ssel'});
  const onDoc = e => { if(!root.contains(e.target)) close(); };
  const close = ()=>{ list.style.display='none'; document.removeEventListener('click', onDoc, true); };
  const open = ()=>{
    list.innerHTML='';
    for(const [v,l] of options){
      list.append(h('div',{className:'ssel-item'+(v===cur?' on':''), onClick:e=>{
        e.stopPropagation();
        cur = v; btnTxt.textContent = label(v); close();
        if(onChange) onChange(v);
      }}, l));
    }
    list.style.display='block';
    document.addEventListener('click', onDoc, true);
  };
  root.append(
    h('button',{className:'ssel-btn', type:'button', onClick:e=>{
      e.preventDefault();
      list.style.display==='block' ? close() : open();
    }}, btnTxt, h('span',{className:'ssel-arr'},'▾')),
    list);
  Object.defineProperty(root, 'value', {
    get: ()=>cur,
    set: v=>{ cur = v; btnTxt.textContent = label(v); },
  });
  return root;
}

/* ── constants ─────────────────────────────────────────────────────── */
const HOUR_PX = 48, EVENT_MIN = 60;
const HOURS = Array.from({length:24}, (_,i)=>i);
const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const QUOTES = [
  '“Stay hungry.”','“The pump is the cure.”',
  '“No pain, no gain.”','“The iron never lies.”',
  '“Reps for the beach.”','“Everybody wants to be a bodybuilder…”',
  '“The last three reps make the muscle grow.”','“Rest builds champions too.”',
  '“Be the hardest worker in the room.”','“Milk is for babies. Lift the iron.”'
];
const EQUIPMENT = ['barbell','dumbbell','kettlebell','machine','cables','bands','pull-up bar','bench'];

/* exercise DB: [name, muscle, [equipment...], bodyweight substitute] */
const EXERCISES = [
  ['Barbell Back Squat','legs',['barbell'],'Pistol Squat Progression'],

/* ── date helpers ──────────────────────────────────────────────────── */
function ds(d){ const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function fromDs(s){ const [y,m,dd]=s.split('-').map(Number); return new Date(y,m-1,dd); }
function today(){ return ds(new Date()); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function wkStart(d){ const wd=new Date(d); const day=wd.getDay(); const diff=day===0?-6:1-day; wd.setDate(wd.getDate()+diff); wd.setHours(0,0,0,0); return wd; }
function dayDiff(a,b){ return Math.round((fromDs(b) - fromDs(a)) / 86400000); }
function fmtTime(t){ if(!t) return ''; const [hh,mm]=t.split(':').map(Number); const am=hh<12; const h12=hh%12===0?12:hh%12; return `${h12}:${String(mm).padStart(2,'0')}${am?'am':'pm'}`; }
function minutesOf(t){ if(!t) return 0; const [hh,mm]=t.split(':').map(Number); return hh*60+mm; }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* workout lookup across presets + custom */
function getWorkout(id){
  if(WORKOUTS[id]) return {id, ...WORKOUTS[id]};
  const c = db.custom.find(w=>w.id===id);
  return c ? {id:c.id, name:c.name, focus:c.focus||'Custom workout', mins:c.mins||40, ex:c.ex} : null;
}
function allWorkoutOptions(){
  const opts = Object.entries(WORKOUTS).map(([id,w])=>[id,w.name]);
  for(const c of db.custom) opts.push([c.id, c.name+' (custom)']);
  return opts;
}

/* ── recurrence engine ─────────────────────────────────────────────── */
/* entry: {id, workoutId, date, time, recur:{freq,interval,days[]}, until, exceptions[]} */
function occursOn(entry, dateStr){
  if(dateStr < entry.date) return false;
  if(entry.exceptions && entry.exceptions.includes(dateStr)) return false;
  if(entry.until && dateStr > entry.until) return false;
  const r = entry.recur || {freq:'none'};
  const diff = dayDiff(entry.date, dateStr);
  if(r.freq === 'none')   return dateStr === entry.date;
  if(r.freq === 'daily')  return diff % (r.interval||1) === 0;
  if(r.freq === 'weekly'){
    const dow = fromDs(dateStr).getDay();
    const days = (r.days && r.days.length) ? r.days : [fromDs(entry.date).getDay()];
    if(!days.includes(dow)) return false;
    const weeks = Math.round((wkStart(fromDs(dateStr)) - wkStart(fromDs(entry.date))) / 604800000);
    return weeks % (r.interval||1) === 0;
  }
  if(r.freq === 'monthly'){
    const a = fromDs(entry.date), b = fromDs(dateStr);
    if(a.getDate() !== b.getDate()) return false;
    const months = (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth());
    return months % (r.interval||1) === 0;
  }
  return false;
}
function eventsForDate(dateStr){
  return db.schedule.filter(e=>occursOn(e, dateStr)).map(e=>({
    entry:e, workout:getWorkout(e.workoutId), date:dateStr, time:e.time,
    done: db.logs.some(l=>l.date===dateStr && l.entryId===e.id),
  })).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
}
function recurLabel(e){
  const r = e.recur||{freq:'none'};
  if(r.freq==='none') return 'One-off';
  if(r.freq==='daily') return r.interval>1?`Every ${r.interval} days`:'Daily';
  if(r.freq==='weekly'){
    const days=(r.days&&r.days.length)?r.days.map(d=>['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d]).join(' · '):'weekly';
    return (r.interval>1?`Every ${r.interval} weeks: `:'Weekly: ')+days;
  }
  if(r.freq==='monthly') return 'Monthly';
  return '';
}

/* ── streak ────────────────────────────────────────────────────────── */
function streakCount(){
  const dates = [...new Set(db.logs.map(l=>l.date))].sort().reverse();
  if(!dates.length) return 0;
  let cur = today();
  if(dates[0] !== cur){
    const y = ds(addDays(new Date(),-1));
    if(dates[0] !== y) return 0;
    cur = y;
  }
  let n = 0;
  for(const d of dates){
    if(d === cur){ n++; cur = ds(addDays(fromDs(cur),-1)); }
    else if(d < cur) break;
  }
  return n;
}

function MiniMonth(){

    h('button',{className:'icon-btn', onClick:()=>{STATE.miniDate=new Date(yr,mo-1,1); render();}},'‹'),
    h('b',{}, d.toLocaleDateString('en-US',{month:'long', year:'numeric'})),
    h('button',{className:'icon-btn', onClick:()=>{STATE.miniDate=new Date(yr,mo+1,1); render();}},'›')));
  const grid = h('div',{className:'mini-grid'});
  DOW.forEach(dw=>grid.append(h('div',{className:'mini-dow'}, dw[0])));
  const first = new Date(yr,mo,1); let sdow = first.getDay(); sdow = sdow===0?6:sdow-1;
  const dim = new Date(yr,mo+1,0).getDate(), prevDim = new Date(yr,mo,0).getDate();
  const cells = [];
  for(let i=sdow-1;i>=0;i--) cells.push({date:new Date(yr,mo-1,prevDim-i), other:true});
  for(let i=1;i<=dim;i++) cells.push({date:new Date(yr,mo,i), other:false});
  while(cells.length%7) cells.push({date:new Date(yr,mo+1,cells.length-sdow-dim+1), other:true});
  for(const {date,other} of cells){
    const s = ds(date);
    const evs = other?[]:eventsForDate(s);
    const cls = 'mini-d'+(other?' dim':'')+(s===today()?' today':'')+(evs.length?(evs.every(e=>e.done)?' ev done':' ev'):'');
    grid.append(h('div',{className:cls, onClick:()=>daySheet(s)}, date.getDate()));
  }
  box.append(grid);
  return box;
}

/* ── schedule sheet (create / edit) ────────────────────────────────── */
function scheduleSheet(prefDate, prefTime, entry, prefWorkout){
  const isEdit = !!entry;
  const st = {
    workoutId: entry ? entry.workoutId : (prefWorkout || Object.keys(WORKOUTS)[0]),
    date: entry ? entry.date : (prefDate || today()),
    time: entry ? (entry.time||'') : (prefTime||''),
    freq: entry ? (entry.recur?entry.recur.freq:'none') : 'none',
    interval: entry && entry.recur ? (entry.recur.interval||1) : 1,
    days: entry && entry.recur && entry.recur.days ? [...entry.recur.days] : [],
    until: entry ? (entry.until||'') : '',
  };
  const wSel = styledSelect(allWorkoutOptions(), st.workoutId);
  const dateInp = h('input',{className:'inp', type:'date', value:st.date});
  const timeInp = h('input',{className:'inp', type:'time', value:st.time});
  const curFreq = st.freq==='daily'&&st.interval>1 ? 'daily2' : (st.freq==='weekly'&&st.interval===2 ? 'weekly2' : st.freq);
  const freqSel = styledSelect(
    [['none','Does not repeat'],['daily','Daily'],['daily2','Every N days'],['weekly','Weekly on chosen days'],['weekly2','Every 2 weeks'],['monthly','Monthly']],
    curFreq, ()=>syncVis());
  const intInp = h('input',{className:'inp', type:'number', min:'2', max:'30', value:String(Math.max(2,st.interval))});
  const intWrap = h('div',{className:'field', style:{display:'none'}}, h('label',{},'Repeat every N days'), intInp);
  const dayChips = h('div',{className:'chiprow'});
  const jsDows = [[1,'Mon'],[2,'Tue'],[3,'Wed'],[4,'Thu'],[5,'Fri'],[6,'Sat'],[0,'Sun']];
  const dayWrap = h('div',{className:'field', style:{display:'none'}}, h('label',{},'On days'), dayChips);
  jsDows.forEach(([v,l])=>{
    const c = h('button',{className:'chip'+(st.days.includes(v)?' on':''), onClick:e=>{
      e.preventDefault();
      const i = st.days.indexOf(v);
      if(i>=0) st.days.splice(i,1); else st.days.push(v);
      c.classList.toggle('on');
    }}, l);
    dayChips.append(c);
  });
  const untilInp = h('input',{className:'inp', type:'date', value:st.until});
  const syncVis = ()=>{
    const v = freqSel.value;
    intWrap.style.display = v==='daily2' ? '' : 'none';
    dayWrap.style.display = (v==='weekly'||v==='weekly2') ? '' : 'none';
  };
  syncVis();

  const save = ()=>{
    const v = freqSel.value;
    let recur = {freq:'none'};
    if(v==='daily')   recur = {freq:'daily', interval:1};
    if(v==='daily2')  recur = {freq:'daily', interval:Math.max(2, parseInt(intInp.value)||2)};
    if(v==='weekly' || v==='weekly2'){
      const days = st.days.length ? st.days : [fromDs(dateInp.value||today()).getDay()];
      recur = {freq:'weekly', interval:v==='weekly2'?2:1, days};
    }
    if(v==='monthly') recur = {freq:'monthly', interval:1};
    const rec = {
      id: entry ? entry.id : uid(),
      workoutId: wSel.value,
      date: dateInp.value || today(),
      time: timeInp.value || null,
      recur, until: untilInp.value || null,
      exceptions: entry ? (entry.exceptions||[]) : [],
    };
    const list = db.schedule.filter(e=>e.id!==rec.id);
    list.push(rec); db.schedule = list;
    back.remove(); render();
    toast(isEdit ? 'Workout updated 💪' : 'Workout scheduled 💪');
  };
  const back = sheet(
    h('h3',{}, isEdit ? 'Edit workout' : 'Schedule workout'),
    h('div',{className:'field'}, h('label',{},'Workout'), wSel),
    h('div',{className:'field'}, h('label',{}, isEdit&&st.freq!=='none' ? 'Series start date' : 'Date'), dateInp),
    h('div',{className:'field'}, h('label',{},'Time (optional)'), timeInp),
    h('div',{className:'field'}, h('label',{},'Repeats'), freqSel),
    intWrap, dayWrap,
    h('div',{className:'field'}, h('label',{},'Ends (optional)'), untilInp),
    h('button',{className:'cta', onClick:save}, isEdit ? 'SAVE CHANGES' : 'ADD TO CALENDAR'));
}

/* ── event sheet (occurrence actions) ──────────────────────────────── */
function eventSheet(ev){
  const e = ev.entry, w = ev.workout;
  const isRecur = e.recur && e.recur.freq !== 'none';
  const back = sheet(
    h('div',{className:'kick'}, fromDs(ev.date).toLocaleDateString('en-US',{weekday:'long', month:'short', day:'numeric'}).toUpperCase() + (ev.time?' · '+fmtTime(ev.time):'')),
    h('h3',{style:{marginTop:'4px'}}, w ? w.name : 'Workout'),
    h('div',{className:'meta'}, (w ? `${w.mins} min · ${w.focus}` : '') + ' · ' + recurLabel(e)),
    w && h('div',{className:'card'},
      w.ex.map(([name,sets,reps,wt])=>h('div',{className:'exrow'}, h('span',{},name), h('span',{className:'set'},`${sets} × ${reps}${wt?` @ ${wt}kg`:''}`)))),
    ev.done
      ? h('div',{className:'meta', style:{marginTop:'10px', color:'var(--done)'}},'✓ Completed — nice work.')
      : h('button',{className:'cta', onClick:()=>{back.remove(); startSession(ev);}},'HIT THE IRON →'),
    h('div',{className:'btnrow'},
      h('button',{className:'cta ghost', style:{flex:1}, onClick:()=>{back.remove(); scheduleSheet(null,null,e);}},'EDIT'+(isRecur?' SERIES':'')),
      h('button',{className:'cta ghost danger', style:{flex:1}, onClick:()=>{
        if(isRecur){
          e.exceptions = e.exceptions||[]; e.exceptions.push(ev.date);
          db.schedule = db.schedule.map(x=>x.id===e.id?e:x);
          toast('Removed this occurrence');
        } else {
          db.schedule = db.schedule.filter(x=>x.id!==e.id);
          toast('Workout removed');
        }
        back.remove(); render();
      }}, isRecur?'SKIP THIS DAY':'DELETE')),
    isRecur && h('button',{className:'cta ghost danger', style:{marginTop:'10px'}, onClick:()=>{
      db.schedule = db.schedule.filter(x=>x.id!==e.id);
      back.remove(); render(); toast('Series deleted');
    }},'DELETE ENTIRE SERIES'));
}

/* ── workout session ───────────────────────────────────────────────── */
function startSession(ev){
  const w = ev.workout || getWorkout(ev.entry.workoutId);
  if(!w) return;
  STATE.session = {
    entryId: ev.entry ? ev.entry.id : null,
    date: ev.date || today(),
    workoutId: w.id, name: w.name,
    startedAt: Date.now(), finished: false,
    ex: w.ex.map(([name,sets,reps,wt])=>({name, reps, sets:Array.from({length:sets},()=>({done:false, weight: wt?String(wt):'', reps:''}))})),
  };
  render();
}
function SessionScreen(){
  const s = STATE.session;
  const wrap = h('div',{className:'screen anim-fade'});
  if(s.finished){
    const totalSets = s.ex.reduce((n,e)=>n+e.sets.filter(x=>x.done).length,0);
    const mins = Math.max(1, Math.round((Date.now()-s.startedAt)/60000));
    wrap.append(h('div',{className:'scrolly'},
      h('div',{className:'doneburst'},
        h('div',{className:'big'},'🏆'),
        h('h2',{},'Front page news!'),
        h('p',{}, `${s.name} — ${totalSets} sets in ${mins} min.\n🔥 Streak: ${streakCount()} day${streakCount()===1?'':'s'}. Keep the fire burning.`),
        h('button',{className:'cta', onClick:()=>{STATE.session=null; STATE.tab='today'; render();}},'DONE'))));
    return wrap;
  }
  wrap.append(h('div',{className:'app-bar'},
    h('button',{className:'icon-btn', onClick:()=>{ if(confirm('Quit this workout? Progress won’t be saved.')){STATE.session=null; render();} }},'✕'),
    h('div',{className:'title'}, s.name),
    h('span',{style:{width:'34px'}})));
  const body = h('div',{className:'scrolly'});
  for(const ex of s.ex){
    const card = h('div',{className:'card'});
    card.append(h('div',{className:'exhead'}, h('b',{},ex.name), h('span',{}, `target ${ex.reps} reps`)));
    ex.sets.forEach((set,i)=>{
      const wInp = h('input',{type:'number', inputmode:'decimal', placeholder:'kg', value:set.weight});
      wInp.addEventListener('input',()=>set.weight=wInp.value);
      const rInp = h('input',{type:'number', inputmode:'numeric', placeholder:ex.reps.replace(/\D/g,'')||'reps', value:set.reps});
      rInp.addEventListener('input',()=>set.reps=rInp.value);
      const tick = h('button',{className:'tick'+(set.done?' on':''), onClick:()=>{set.done=!set.done; tick.classList.toggle('on'); tick.textContent='✓';}},'✓');
      card.append(h('div',{className:'setrow'},
        h('span',{className:'snum'},'S'+(i+1)), wInp, h('span',{className:'unit'},'kg'), rInp, h('span',{className:'unit'},'reps'), tick));
    });
    body.append(card);
  }
  body.append(h('button',{className:'cta', onClick:()=>{
    const anyDone = s.ex.some(e=>e.sets.some(x=>x.done));
    if(!anyDone && !confirm('No sets ticked — finish anyway?')) return;
    const logs = db.logs;
    logs.push({id:uid(), date:s.date, entryId:s.entryId, workoutId:s.workoutId, name:s.name,
      finishedAt:Date.now(), mins:Math.round((Date.now()-s.startedAt)/60000),
      ex:s.ex.map(e=>({name:e.name, sets:e.sets.filter(x=>x.done).map(x=>({w:x.weight, r:x.reps}))}))});
    db.logs = logs;
    s.finished = true; render();
  }},'FINISH WORKOUT 🏁'));
  wrap.append(body);
  return wrap;
}

function planSheet(p){

    h('h3',{}, p.name),
    h('div',{className:'meta'}, p.days+' — '+p.desc),

      p.sched.map(([dow,wid])=>{

function isWeighted(exName){
  const ex = EXERCISES.find(e=>e.name===exName);
  return !!(ex && ex.equip.some(q=>['barbell','dumbbell','kettlebell','machine','cables'].includes(q)));
}
function isTimed(exName){
  const ex = EXERCISES.find(e=>e.name===exName);
  return !!(ex && ex.timed);
}
function exercisePicker(onPick){
  let muscle='all', q='';
  const search = h('input',{className:'inp', placeholder:'Search exercises…'});
  const chips = h('div',{className:'chiprow'});
  const list = h('div',{className:'pick-list'});
  const refresh = ()=>{
    list.innerHTML='';
    const ql = q.trim().toLowerCase();
    let shown = 0;
    for(const ex of EXERCISES){
      if(muscle!=='all' && ex.muscle!==muscle) continue;
      if(ql && !ex.name.toLowerCase().includes(ql)) continue;
      list.append(h('div',{className:'pick-item', onClick:()=>{back.remove(); onPick(ex);}},
        h('div',{},
          h('div',{className:'pn'}, ex.name),
          h('div',{className:'pe'}, (ex.equip.length?ex.equip.join(' / '):'bodyweight') + (ex.timed?' · timed':''))),
        h('span',{className:'pm'}, ex.muscle)));
      shown++;
    }
    if(!shown) list.append(h('div',{className:'empty'},'No match. Try another filter.'));
  };
  MUSCLES.forEach(m=>{
    const c = h('button',{className:'chip'+(m===muscle?' on':''), onClick:()=>{
      muscle = m;
      chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      c.classList.add('on'); refresh();
    }}, m[0].toUpperCase()+m.slice(1));
    chips.append(c);
  });
  search.addEventListener('input',()=>{ q = search.value; refresh(); });
  const back = sheet(h('h3',{},'Pick an exercise'), h('div',{className:'field'}, search), chips, list);
  refresh();
}
function customSheet(existing){
  const rows = existing ? existing.ex.map(e=>({
    name:e[0], sets:e[1],
    reps:String(e[2]).replace(/s$/,''),
    timed:/s$/.test(String(e[2])) || isTimed(e[0]),
    weight:e[3]||'',
  })) : [];
  const nameInp = h('input',{className:'inp', placeholder:'e.g. Saturday Smash', value: existing?existing.name:''});
  const listEl = h('div',{});
  const redraw = ()=>{
    listEl.innerHTML='';
    if(!rows.length) listEl.append(h('div',{className:'empty'},'No exercises yet.\nAdd some iron below.'));
    rows.forEach((r,i)=>{
      const setsInp = h('input',{type:'number', inputmode:'numeric', min:'1', max:'12', value:String(r.sets)});
      setsInp.addEventListener('input',()=>r.sets=setsInp.value);
      const repsInp = h('input',{type:'number', inputmode:'numeric', min:'1', value:String(r.reps)});
      repsInp.addEventListener('input',()=>r.reps=repsInp.value);
      const ctl = h('div',{className:'bx-ctl'},
        h('div',{className:'bx-f'}, h('label',{},'Sets'), setsInp),
        h('div',{className:'bx-f'}, h('label',{}, r.timed?'Seconds':'Reps'), repsInp));
      if(isWeighted(r.name)){
        const wInp = h('input',{type:'number', inputmode:'decimal', placeholder:'—', value:r.weight?String(r.weight):''});
        wInp.addEventListener('input',()=>r.weight=wInp.value);
        ctl.append(h('div',{className:'bx-f'}, h('label',{},'Kg'), wInp));
      }
      const meta = EXERCISES.find(e=>e.name===r.name);
      listEl.append(h('div',{className:'bx'},
        h('div',{className:'bx-head'},
          h('div',{},
            h('div',{className:'bx-name'}, r.name),
            h('div',{className:'bx-mus'}, (meta?meta.muscle:'custom') + (r.timed?' · timed':''))),
          h('button',{className:'bx-x', onClick:()=>{rows.splice(i,1); redraw();}},'✕')),
        ctl));
    });
  };
  redraw();
  const back = sheet(
    h('h3',{}, existing ? 'Edit workout' : 'Custom workout'),
    h('div',{className:'field'}, h('label',{},'Name'), nameInp),
    h('div',{className:'field'}, h('label',{},'Exercises'), listEl),
    h('button',{className:'cta ghost', onClick:()=>exercisePicker(ex=>{
      rows.push({name:ex.name, sets:3, reps: ex.timed?30:10, timed:!!ex.timed, weight:''});
      redraw();
    })},'＋ ADD EXERCISE'),
    h('button',{className:'cta', onClick:()=>{
      const name = nameInp.value.trim();
      if(!name) return toast('Give it a name');
      if(!rows.length) return toast('Add at least one exercise');

        const sets = Math.max(1, parseInt(r.sets)||3);

        const t = [r.name, sets, reps];
        const w = parseFloat(r.weight);
        if(!isNaN(w) && w>0) t.push(w);
        return t;
      });
      const list = db.custom.filter(c=>!existing || c.id!==existing.id);
      list.push({id: existing?existing.id:'c_'+uid(), name, focus:'Custom workout', mins: existing&&existing.mins?existing.mins:40, ex});
      db.custom = list;
      back.remove(); render(); toast(existing?'Workout updated':'Custom workout saved');
    }},'SAVE WORKOUT'));
}

• Compound lifts first, isolation after
• Consistency beats intensity — 3 good sessions every week wins

Want a custom meal plan or a tweak to your current split? Just ask. (Add your Anthropic API key in Settings ⚙︎ for real, personalised answers from Claude.)`],
];
async function askClaude(history){
  const key = db.apiKey;
  if(!key){
    await new Promise(r=>setTimeout(r, 700));
    const last = history[history.length-1].content;
    return {demo:true, text: DEMO_REPLIES.find(([re])=>re.test(last))[1]};
  }
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body: JSON.stringify({
      model: COACH_MODEL,
      max_tokens: 2048,
      system: coachSystemPrompt(),
      messages: history,
    }),
  });
  if(!res.ok){
    let msg = 'API error '+res.status;
    try{ const j = await res.json(); if(j.error && j.error.message) msg = j.error.message; }catch(e){}
    throw new Error(msg);
  }
  const data = await res.json();
  const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n') || '(no reply)';
  return {demo:false, text};
}
function CoachScreen(){
  const wrap = h('div',{className:'screen'});
  wrap.append(h('div',{className:'app-bar'},
    h('div',{className:'title'},'Coach'),
    h('button',{className:'icon-btn', title:'Settings', onClick:settingsSheet},'⚙︎')));
  if(!db.apiKey) wrap.append(h('div',{className:'keynote'},
    '🔑 Demo mode — answers are canned examples. Add your own Anthropic API key in Settings ⚙︎ to chat with the real Claude. Your key stays on this device only.'));
  const chat = h('div',{className:'chat'});
  const hist = db.coach;
  if(!hist.length) chat.append(h('div',{className:'msg bot'},
    "Hey! I'm your Brologue coach. 💪 Ask me for meal plans, dietary advice, workout programming, or exercise swaps — I know what equipment you've got and what you've been training."));
  for(const m of hist){
    const el = h('div',{className:'msg '+(m.role==='user'?'user':'bot')+(m.demo?' demo':'')});
    if(m.demo) el.append(h('span',{className:'demo-tag'},'DEMO REPLY'));
    el.append(m.content);
    chat.append(el);
  }
  const chips = h('div',{className:'chiprow', style:{padding:'0 16px 8px'}},
    [['🍽 Meal plan','Build me a one-day meal plan that fits my training.'],
     ['🥦 Diet advice','Give me 5 practical diet tips for my goals.'],
     ['🏋️ Workout advice','Review my weekly schedule and suggest improvements.'],
     ['🔁 Substitute','Suggest substitutes for exercises I lack equipment for.']]
    .map(([l,q])=>h('button',{className:'chip', onClick:()=>send(q)}, l)));
  const ta = h('textarea',{className:'inp', rows:'1', placeholder:'Ask your coach anything…',
    style:{background:'#1d1413'}});
  ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(ta.value); } });
  const sendBtn = h('button',{className:'send', onClick:()=>send(ta.value)},'➤');
  const inputBar = h('div',{className:'coach-input'}, ta, sendBtn);
  async function send(text){
    text = (text||'').trim();
    if(!text || STATE.coachBusy) return;
    ta.value='';
    const hist2 = db.coach;
    hist2.push({role:'user', content:text});
    db.coach = hist2.slice(-24);
    STATE.coachBusy = true; render();
    const chatEl = document.querySelector('.chat');
    if(chatEl){ chatEl.append(h('div',{className:'typing'},'Coach is thinking…')); chatEl.scrollTop = chatEl.scrollHeight; }
    try{
      const apiHist = db.coach.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role, content:m.content}));
      const {demo, text:reply} = await askClaude(apiHist);
      const hist3 = db.coach;
      hist3.push({role:'assistant', content:reply, demo});
      db.coach = hist3.slice(-24);
    }catch(err){
      const hist3 = db.coach;
      hist3.push({role:'assistant', content:'⚠️ '+err.message+'\n\nCheck your API key in Settings, or try again.', demo:false});
      db.coach = hist3.slice(-24);
    }
    STATE.coachBusy = false; render();
    const c2 = document.querySelector('.chat'); if(c2) c2.scrollTop = c2.scrollHeight;
  }
  wrap.append(chat, chips, inputBar);
  setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; },30);
  return wrap;
}

/* ── settings ──────────────────────────────────────────────────────── */
function settingsSheet(){
  const keyInp = h('input',{className:'inp', type:'password', placeholder:'sk-ant-…', value:db.apiKey});
  const eqChips = h('div',{className:'chiprow'});
  const have = new Set(db.equipment);
  EQUIPMENT.forEach(q=>{
    const c = h('button',{className:'chip'+(have.has(q)?' on':''), onClick:e=>{
      e.preventDefault();
      if(have.has(q)) have.delete(q); else have.add(q);
      c.classList.toggle('on');
      db.equipment = [...have];
    }}, q);
    eqChips.append(c);
  });
  const back = sheet(
    h('h3',{},'Settings'),
    h('div',{className:'field'}, h('label',{},'My equipment (bodyweight always counts)'), eqChips),
    h('div',{className:'field'}, h('label',{},'Anthropic API key — for the Claude coach'), keyInp,
      h('div',{className:'meta', style:{marginTop:'6px'}},'Stored only on this device. Get a key at console.anthropic.com. Without one, the coach runs in demo mode.')),
    h('button',{className:'cta', onClick:()=>{ db.apiKey = keyInp.value.trim(); back.remove(); render(); toast('Settings saved'); }},'SAVE'),
    h('button',{className:'cta ghost danger', style:{marginTop:'10px'}, onClick:()=>{
      if(confirm('Erase ALL Brologue data on this device (schedule, logs, settings)?')){ localStorage.clear(); location.reload(); }
    }},'RESET ALL DATA'));
}

/* ── PWA: install banner + service worker + splash ─────────────────── */
function showInstallBanner(){
  if(store.get('bl_install_dismissed', false)) return;
  if(window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) return;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if(!STATE.deferredInstall && !isIOS) return;
  const bar = h('div',{className:'install-bar'},
    h('span',{style:{fontSize:'22px'}},'🔥'),
    h('div',{className:'t'}, isIOS && !STATE.deferredInstall
      ? 'Install Brologue: tap Share, then “Add to Home Screen”.'
      : 'Install Brologue on your phone for the full app experience.'),
    STATE.deferredInstall ? h('button',{className:'go', onClick:async()=>{
        bar.remove(); STATE.deferredInstall.prompt();
        await STATE.deferredInstall.userChoice; STATE.deferredInstall=null;
      }},'INSTALL') : null,
    h('button',{className:'icon-btn', onClick:()=>{ bar.remove(); store.set('bl_install_dismissed', true); }},'✕'));
  document.body.append(bar);
}
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  STATE.deferredInstall = e;
  showInstallBanner();
});

function boot(){
  const standalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if(standalone){
    const sp = document.getElementById('splash');
    sp.style.display = 'flex';
    setTimeout(()=>{ sp.style.display='none'; }, 900);
  }
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
  render();
  setTimeout(showInstallBanner, 2500);
}
boot();
</script>
